<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Casa del Repuesto</title>
    
    <!-- Librería Oficial de Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Arial', sans-serif;
            margin: 40px auto;
            max-width: 600px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #d93838;
            text-align: center;
            font-size: 32px;
            margin-bottom: 5px;
        }

        h2 {
            color: #555;
            text-align: center;
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 25px;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        .logo-negocio {
            display: block;
            margin: 0 auto 20px auto;
            max-width: 80%;
            height: auto;
        }

        /* Estilo para las tarjetas de productos de Supabase */
        .catalogo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .card-producto {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-producto img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .card-producto h4 {
            color: #333;
            margin-bottom: 5px;
        }

        .card-producto p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        button, .btn-whatsapp {
            display: inline-block;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button:hover, .btn-whatsapp:hover {
            background-color: #128C7E;
        }

        .btn-secundario {
            background-color: #333;
        }
        .btn-secundario:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <img src="logo.jpg" alt="Logo de La Casa del Repuesto" class="logo-negocio">
    
    <h1>La Casa del Repuesto</h1>
    <h2>Todo lo que tu carro necesita en un solo lugar</h2>
    <p>Ofrecemos repuestos de alta calidad con la mejor atención. ¡Cotizá con nosotros!</p>


    <hr>

    <a href="categorias.html">
        <button type="button" class="btn-secundario">¿Buscás un repuesto específico por categoría?</button>
    </a>
    
    <a href="https://wa.me/50233775759?text=Hola,%20busco%20un%20repuesto" target="_blank">
        <button type="button">Cotizar por WhatsApp General</button>
    </a>

</body>
</html>
